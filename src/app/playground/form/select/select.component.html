<div class="select-root">
<div class="fd-page">
  <div class="fd-header">
    <h2>Select</h2>
    <p>Single-choice dropdown.</p>
  </div>

  <div class="fd-card">
    <div class="fd-field">
      <label for="demo-select">Choose a status</label>
      <select id="demo-select" defaultValue="in-progress">
        <option value="not-started">Not started</option>
        <option value="in-progress">In progress</option>
        <option value="done">Done</option>
      </select>
    </div>
  </div>
</div>
</div>
