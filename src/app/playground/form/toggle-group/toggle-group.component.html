<div class="toggle-group-root">
<div class="fd-page">
  <div class="fd-header">
    <h2>Toggle Group</h2>
    <p>Grouped toggle selections (multiple).</p>
  </div>

  <div class="fd-card">
    <div class="fd-segment" role="group" aria-label="Toggle group (multiple)">
      <button type="button" class="fd-segment-btn fd-segment-btn--on" aria-pressed="true">A</button>
      <button type="button" class="fd-segment-btn" aria-pressed="false">B</button>
      <button type="button" class="fd-segment-btn fd-segment-btn--on" aria-pressed="true">C</button>
      <button type="button" class="fd-segment-btn fd-segment-btn--disabled" aria-pressed="false" disabled>D</button>
    </div>
  </div>
</div>
</div>
