    <h2>Button Toggle</h2>

  </div>

  <div class="fd-card">
    <div class="fd-segment" role="radiogroup" aria-label="Button toggle (single)">
      <button type="button" class="fd-segment-btn fd-segment-btn--on" aria-pressed="true">One</button>

    </div>
  </div>
</div>
</div>
