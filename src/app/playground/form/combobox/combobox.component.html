<div class="combobox-root">
<div class="fd-page">
  <div class="fd-header">
    <h2>Combobox</h2>
    <p>Text input with suggestions.</p>
  </div>

  <div class="fd-card">
    <div class="fd-field">
      <label for="demo-combobox">Pick a country</label>
      <input id="demo-combobox" list="demo-countries" placeholder="Start typing..." />
      <datalist id="demo-countries">
        <option value="Canada"></option>
        <option value="France"></option>
        <option value="Germany"></option>
        <option value="Japan"></option>
        <option value="United States"></option>
      </datalist>
      <span class="fd-hint">Uses native datalist for an autocomplete-like experience.</span>
    </div>
  </div>
</div>
</div>
