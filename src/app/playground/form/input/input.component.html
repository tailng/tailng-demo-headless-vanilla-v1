<div class="input-root">
<div class="fd-page">
  <div class="fd-header">
    <h2>Input</h2>
    <p>Single-line text input with label and helper text.</p>
  </div>

  <div class="fd-card">
    <div class="fd-field">
      <label for="demo-input">Name</label>
      <input id="demo-input" type="text" placeholder="Jane Doe" />
      <span class="fd-hint">This is a simple, non-empty demo for the input primitive.</span>
    </div>

    <div class="fd-field">
      <label for="demo-input-disabled">Disabled</label>
      <input id="demo-input-disabled" type="text" placeholder="Disabled" disabled />
    </div>
  </div>
</div>
</div>
