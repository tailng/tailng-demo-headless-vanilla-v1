<div class="toggle-root">
<div class="fd-page">
  <div class="fd-header">
    <h2>Toggle</h2>
    <p>Icon-style pressed button.</p>
  </div>

  <div class="fd-card">
    <div class="fd-toggle-row">
      <button type="button" class="fd-toggle fd-toggle--on" aria-pressed="true">On</button>
      <button type="button" class="fd-toggle" aria-pressed="false">Off</button>
      <button type="button" class="fd-toggle fd-toggle--disabled" aria-pressed="false" disabled>Disabled</button>
    </div>
  </div>
</div>
</div>
