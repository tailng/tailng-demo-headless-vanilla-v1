<div class="checkbox-root">
<div class="fd-page">
  <div class="fd-header">
    <h2>Checkbox</h2>
    <p>Checked/unchecked and a mixed-state example.</p>
  </div>

  <div class="fd-card">
    <div class="fd-options">
      <label class="fd-option">
        <input type="checkbox" checked />
        <span>Checked</span>
      </label>

      <label class="fd-option">
        <input type="checkbox" />
        <span>Unchecked</span>
      </label>

      <div class="fd-option fd-option--mixed" role="checkbox" aria-checked="mixed" tabindex="0">
        <span>Mixed (indeterminate) state</span>
      </div>

      <label class="fd-option fd-option--disabled">
        <input type="checkbox" disabled />
        <span>Disabled</span>
      </label>
    </div>
  </div>
</div>
</div>
