<div class="radio-root">
<div class="fd-page">
  <div class="fd-header">
    <h2>Radio</h2>
    <p>Grouped single-select options.</p>
  </div>

  <div class="fd-card">
    <fieldset>
      <legend>Choose one</legend>

      <label class="fd-option">
        <input type="radio" name="demo-radio" checked />
        <span>Option A</span>
      </label>

      <label class="fd-option">
        <input type="radio" name="demo-radio" />
        <span>Option B</span>
      </label>

      <label class="fd-option fd-option--disabled">
        <input type="radio" name="demo-radio" disabled />
        <span>Disabled option</span>
      </label>
    </fieldset>
  </div>
</div>
</div>
