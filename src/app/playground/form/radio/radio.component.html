<fieldset class="headless-radio-plan-card">
  <legend class="headless-radio-plan-card__legend">Billing plan</legend>
  <label class="headless-radio-plan-card__row">
    <input
      type="radio"
      tngRadio
      name="billing-plan"
      [checked]="selectedPlan() === 'starter'"
      (change)="onPlanChange('starter', $event)"
      class="headless-radio-plan-card__control"
    />
    <span>Starter</span>
  </label>
  <label class="headless-radio-plan-card__row">
    <input
      type="radio"
      tngRadio
      name="billing-plan"
      [checked]="selectedPlan() === 'pro'"
      (change)="onPlanChange('pro', $event)"
      class="headless-radio-plan-card__control"
    />
    <span>Pro</span>
  </label>
  <label class="headless-radio-plan-card__row">
    <input
      type="radio"
      tngRadio
      name="billing-plan"
      [checked]="selectedPlan() === 'enterprise'"
      (change)="onPlanChange('enterprise', $event)"
      class="headless-radio-plan-card__control"
    />
    <span>Enterprise</span>
  </label>
  <p class="headless-radio-plan-card__summary">Selected: {{ selectedPlan() }}</p>
</fieldset>

<fieldset class="headless-radio-filter-card">
  <legend class="headless-radio-filter-card__legend">Release target</legend>
  <label class="headless-radio-filter-card__row">
    <input type="radio" tngRadio name="release-target" [checked]="true" class="headless-radio-filter-card__control" />
    <span>Production release</span>
  </label>
  <label class="headless-radio-filter-card__row headless-radio-filter-card__row--invalid">
    <input type="radio" tngRadio name="release-target" [invalid]="true" class="headless-radio-filter-card__control" />
    <span>Needs compliance approval</span>
  </label>
</fieldset>
