<div class="switch-root">
<div class="fd-page">
  <div class="fd-header">
    <h2>Switch</h2>
    <p>Two-state on/off control.</p>
  </div>

  <div class="fd-card">
    <div class="fd-options">
      <label class="fd-switch">
        <input type="checkbox" checked />
        <span>Enabled</span>
      </label>

      <label class="fd-switch">
        <input type="checkbox" />
        <span>Disabled</span>
      </label>

      <label class="fd-switch fd-switch--disabled">
        <input type="checkbox" disabled />
        <span>Read-only</span>
      </label>
    </div>
  </div>
</div>
</div>
