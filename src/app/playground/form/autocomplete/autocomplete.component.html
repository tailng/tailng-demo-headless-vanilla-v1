<div class="autocomplete-root">
<div class="fd-page">
  <div class="fd-header">
    <h2>Autocomplete</h2>
    <p>Dynamic suggestion list (static demo).</p>
  </div>

  <div class="fd-card">
    <div class="fd-field">
      <label for="demo-autocomplete">Search</label>
      <input id="demo-autocomplete" list="demo-suggestions" placeholder="Type to filter..." />
      <datalist id="demo-suggestions">
        <option value="Accordion"></option>
        <option value="Checkbox"></option>
        <option value="Dropdown Menu"></option>
        <option value="Popover"></option>
        <option value="Tooltip"></option>
      </datalist>
      <span class="fd-hint">Native datalist-based demo (no advanced filtering).</span>
    </div>
  </div>
</div>
</div>
