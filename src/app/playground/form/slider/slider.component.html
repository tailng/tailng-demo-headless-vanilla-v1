<div class="slider-root">
<div class="fd-page">
  <div class="fd-header">
    <h2>Slider</h2>
    <p>Range-based input with min/max/step.</p>
  </div>

  <div class="fd-card">
    <div class="fd-field">
      <label for="demo-slider">Value</label>
      <input id="demo-slider" type="range" min="0" max="100" step="5" value="35" />
      <div class="fd-range-row">
        <span>0</span>
        <span class="fd-range-value">35</span>
        <span>100</span>
      </div>
    </div>
  </div>
</div>
</div>
