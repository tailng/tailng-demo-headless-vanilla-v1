<section class="headless-label-overview-card">
  <div class="headless-label-overview-card__field">
    <label tngLabel [required]="true" for="headless-label-plain-workspace">
      Workspace name
    </label>
    <input
      id="headless-label-plain-workspace"
      class="headless-label-overview-card__input"
      type="text"
      placeholder="North Star"
      aria-required="true"
    />
  </div>
  <label tngLabel class="headless-label-overview-card__consent">
    <input class="headless-label-overview-card__checkbox" type="checkbox" />
    <span>Send the release announcement to Slack</span>
  </label>
</section>
<br />
<section class="headless-label-style-card">
  <div class="headless-label-style-card__field">
    <label tngLabel [required]="true" for="headless-label-style-owner">
      Release owner
    </label>
    <input id="headless-label-style-owner" class="headless-label-style-card__input" type="text" />
  </div>
  <div class="headless-label-style-card__field">
    <label tngLabel [disabled]="true" for="headless-label-style-archive">
      Archived environment
    </label>
    <input id="headless-label-style-archive" class="headless-label-style-card__input" type="text" disabled />
  </div>
</section>
<br />
<section class="headless-label-overview-card">
<label tngLabel class="headless-label-choice-row">
  <input class="headless-label-choice-row__checkbox" type="checkbox" />
  <span>Send the release announcement to Slack</span>
</label>
</section>
