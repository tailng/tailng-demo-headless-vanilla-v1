<div class="label-root">
<div class="fd-page">
  <div class="fd-header">
    <h2>Label</h2>
    <p>Accessible form labels (required/disabled states).</p>
  </div>

  <div class="fd-card">
    <div class="fd-field">
      <label for="demo-label-required"><span class="fd-required">*</span> Email</label>
      <input id="demo-label-required" type="email" placeholder="name@example.com" required />
    </div>

    <div class="fd-field">
      <label for="demo-label-disabled">Disabled</label>
      <input id="demo-label-disabled" type="text" placeholder="Disabled" disabled />
    </div>
  </div>
</div>
</div>
